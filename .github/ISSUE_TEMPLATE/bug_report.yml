name: 🐞 Bug Report
description: Create a report to help us improve.
labels: [bug]
body:
  - type: checkboxes
    id: terms
    attributes:
      label: Welcome
      options:
        - label: Yes, I'm using the [latest available release](https://github.com/ldez/ghforms/releases).
          required: true
        - label: Yes, I've searched for similar issues on GitHub and didn't find any.
          required: true

  - type: input
    id: version
    attributes:
      label: Effective version
      description: "`latest` or `dev` are NOT effective versions."
      placeholder: "e.g. v4.21.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      value: |-
        <details>

        ```console
        # paste output here
        ```

        </details>
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to see?
      placeholder: Description.
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: What did you see instead?
      placeholder: Description.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: "How do you trigger this bug? Please walk us through it step by step."
      placeholder: |
        1. ...
        2. ...
        3. ...
        ...
    validations:
      required: true

  - type: textarea
    id: go-env
    attributes:
      label: Go environment (if applicable)
      description: "Paste the output of `go version && go env` here."
      value: |-
        <details>

        ```console
        # paste output here
        ```

        </details>
    validations:
      required: false

  - type: checkboxes
    id: value-affirmation
    attributes:
      label: 🌱 Supporting the Maintainer
      options:
        - label: "Yes, I find this project useful, and it has saved me time in my workflow/business."
          required: false
        - label: "Yes, I have [starred](https://github.com/ldez/ghforms) this repository to help others find it."
          required: false
        - label: "Yes, I have [sponsored](https://donate.ldez.dev) this project to keep the project stable and maintained."
          required: false
